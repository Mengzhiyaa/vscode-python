name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
            cargo_target: x86_64-unknown-linux-musl
            target_os: linux
            target_arch: x64
          - runner: ubuntu-latest
            target: linux-arm64
            cargo_target: aarch64-unknown-linux-gnu
            target_os: linux
            target_arch: arm64
          - runner: macos-15
            target: darwin-x64
            cargo_target: x86_64-apple-darwin
            target_os: darwin
            target_arch: x64
          - runner: macos-latest
            target: darwin-arm64
            cargo_target: aarch64-apple-darwin
            target_os: darwin
            target_arch: arm64
          - runner: windows-latest
            target: win32-x64
            cargo_target: x86_64-pc-windows-msvc
            target_os: windows
            target_arch: x64
          - runner: windows-latest
            target: win32-arm64
            cargo_target: aarch64-pc-windows-msvc
            target_os: windows
            target_arch: arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Python Environment Tools
        uses: actions/checkout@v4
        with:
          repository: 'microsoft/python-environment-tools'
          path: 'python-env-tools'
          persist-credentials: false
          sparse-checkout: |
            crates
            Cargo.toml
            Cargo.lock
          sparse-checkout-cone-mode: false

      - name: Install APK binary
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          npm ci
          npm run install:apk -- --retry 3

      - name: Build VSIX
        uses: ./.github/actions/build-vsix
        with:
          node_version: '22'
          vsix_name: 'vscode-python-${{ matrix.target }}.vsix'
          artifact_name: 'vscode-python-${{ matrix.target }}'
          cargo_target: ${{ matrix.cargo_target }}
          vsix_target: ${{ matrix.target }}

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.vsix
          generate_release_notes: true

  publish-marketplace:
    needs:
      - package
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Download packaged artifacts
        if: env.VSCE_PAT != ''
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Node.js
        if: env.VSCE_PAT != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Publish to Visual Studio Marketplace
        if: env.VSCE_PAT != ''
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(artifacts/**/*.vsix)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No VSIX artifacts found"
            exit 1
          fi
          npx @vscode/vsce publish --skip-duplicate --packagePath "${files[@]}" --pat "${VSCE_PAT}"

  publish-openvsx:
    needs:
      - package
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Download packaged artifacts
        if: env.OVSX_PAT != ''
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Node.js
        if: env.OVSX_PAT != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(artifacts/**/*.vsix)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No VSIX artifacts found"
            exit 1
          fi
          npx ovsx -p "${OVSX_PAT}" publish --skip-duplicate --packagePath "${files[@]}"
